name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-and-manifests:
    name: Python scripts and plugin metadata
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Compile bundled Python scripts
        run: |
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/pycache" \
            python -m compileall -q \
              plugins/memory/skills/memory-setup/scripts \
              plugins/memory/skills/memory-setup/tests \
              plugins/productivity/skills/agent-ops-setup/scripts \
              plugins/productivity/skills/agent-ops-setup/tests \
              plugins/productivity/skills/agent-ops-report/scripts \
              plugins/productivity/skills/agent-ops-report/tests

      - name: Run memory setup tests
        run: |
          PYTHONDONTWRITEBYTECODE=1 \
            python -m pytest plugins/memory/skills/memory-setup/tests -q -p no:cacheprovider
          PYTHONDONTWRITEBYTECODE=1 \
            python -m pytest \
              plugins/productivity/skills/agent-ops-setup/tests \
              plugins/productivity/skills/agent-ops-report/tests \
              -q -p no:cacheprovider

      - name: Validate JSON manifests
        run: |
          python -m json.tool .agents/plugins/marketplace.json >/dev/null
          python -m json.tool .claude-plugin/marketplace.json >/dev/null
          python -m json.tool plugins/memory/.claude-plugin/plugin.json >/dev/null
          python -m json.tool plugins/memory/.codex-plugin/plugin.json >/dev/null

      - name: Validate static site asset references
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class SiteParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.srcs = []
                  self.hrefs = []
                  self.h1 = []
                  self.in_h1 = False

              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  if "src" in attrs:
                      self.srcs.append(attrs["src"])
                  if "href" in attrs:
                      self.hrefs.append(attrs["href"])
                  if tag == "h1":
                      self.in_h1 = True

              def handle_endtag(self, tag):
                  if tag == "h1":
                      self.in_h1 = False

              def handle_data(self, data):
                  if self.in_h1:
                      self.h1.append(data.strip())

          path = Path("docs/index.html")
          parser = SiteParser()
          parser.feed(path.read_text())

          missing = [
              src for src in parser.srcs
              if not src.startswith(("http://", "https://", "data:"))
              and not (path.parent / src).exists()
          ]
          if missing:
              raise SystemExit(f"Missing local site assets: {missing}")
          if "Memory as reliability practice" not in " ".join(parser.h1):
              raise SystemExit("Expected site H1 was not found")
          PY
